<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Translator</title>
    <link rel="stylesheet" href="/static/style.css?v=20260312-2">
</head>
<body>
    <div class="container">
        <div class="lang-toggle">
            <label for="ui-lang" class="lang-label">UI</label>
            <select id="ui-lang">
                <option value="en">English</option>
                <option value="es">Espanol</option>
                <option value="ar">العربية</option>
                <option value="hi">हिंदी</option>
                <option value="tl">Tagalog</option>
            </select>
        </div>

        <h1 data-i18n="title">Live Translator</h1>
        <p class="tagline" data-i18n="tagline">Real-time speech translation between two people</p>

        <div class="notice" data-i18n="notice">
            For best results on Android, use Chrome. iOS Safari/WKWebView may not support live dictation.
        </div>

        <button id="create-btn" class="btn primary" data-i18n="create">Create New Room</button>
        <button id="share-room-btn" class="btn secondary" data-i18n="share">Create & Copy Room Link</button>

        <div class="divider" data-i18n="divider">or join an existing room</div>

        <div class="join-row">
            <input type="text" id="room-code" placeholder="Enter room code" maxlength="6" autocomplete="off" data-i18n-placeholder="placeholder">
            <button id="join-btn" class="btn secondary" data-i18n="join">Join</button>
        </div>

        <div class="share-link">
            <span data-i18n="share_base">Share base URL:</span>
            <code id="base-url"></code>
            <button id="copy-base-btn" class="btn small" data-i18n="copy">Copy</button>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                title: 'Live Translator',
                tagline: 'Real-time speech translation between two people',
                notice: 'For best results on Android, use Chrome. iOS Safari/WKWebView may not support live dictation.',
                create: 'Create New Room',
                share: 'Create & Copy Room Link',
                divider: 'or join an existing room',
                placeholder: 'Enter room code',
                join: 'Join',
                share_base: 'Share base URL:',
                copy: 'Copy',
                copied: 'Copied!',
                link_copied: 'Link Copied!',
            },
            es: {
                title: 'Traductor en Vivo',
                tagline: 'Traduccion de voz en tiempo real entre dos personas',
                notice: 'Para mejores resultados en Android, usa Chrome. iOS Safari/WKWebView puede no soportar dictado en vivo.',
                create: 'Crear Sala Nueva',
                share: 'Crear y Copiar Enlace',
                divider: 'o unete a una sala existente',
                placeholder: 'Ingresa el codigo',
                join: 'Unirse',
                share_base: 'URL base para compartir:',
                copy: 'Copiar',
                copied: 'Copiado!',
                link_copied: 'Enlace Copiado!',
            }
            ,
            ar: {
                title: 'مترجم مباشر',
                tagline: 'ترجمة صوتية فورية بين شخصين',
                notice: 'لأفضل النتائج على أندرويد، استخدم كروم. قد لا يدعم Safari/WKWebView الإملاء المباشر.',
                create: 'إنشاء غرفة جديدة',
                share: 'إنشاء ونسخ الرابط',
                divider: 'أو الانضمام إلى غرفة',
                placeholder: 'أدخل رمز الغرفة',
                join: 'انضمام',
                share_base: 'رابط الأساس للمشاركة:',
                copy: 'نسخ',
                copied: 'تم النسخ!',
                link_copied: 'تم نسخ الرابط!',
            },
            hi: {
                title: 'लाइव ट्रांसलेटर',
                tagline: 'दो लोगों के बीच रियल-टाइम अनुवाद',
                notice: 'Android पर बेहतर परिणाम के लिए Chrome उपयोग करें। iOS Safari/WKWebView में लाइव डिक्टेशन काम न कर सकता है।',
                create: 'नई रूम बनाएं',
                share: 'रूम लिंक बनाएं और कॉपी करें',
                divider: 'या मौजूदा रूम जॉइन करें',
                placeholder: 'रूम कोड दर्ज करें',
                join: 'जॉइन',
                share_base: 'शेयर करने के लिए बेस URL:',
                copy: 'कॉपी',
                copied: 'कॉपी हो गया!',
                link_copied: 'लिंक कॉपी हो गया!',
            },
            tl: {
                title: 'Live Translator',
                tagline: 'Real-time na pagsasalin ng boses',
                notice: 'Pinakamahusay sa Android Chrome. Maaaring hindi gumana ang live dictation sa iOS Safari/WKWebView.',
                create: 'Gumawa ng Bagong Room',
                share: 'Gumawa at Kopyahin ang Link',
                divider: 'o sumali sa existing room',
                placeholder: 'Ilagay ang room code',
                join: 'Sumali',
                share_base: 'Base URL para i-share:',
                copy: 'Kopyahin',
                copied: 'Nakopya!',
                link_copied: 'Nakopya ang link!',
            }
        };

        let currentLang = 'en';

        function applyLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-i18n]').forEach((el) => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach((el) => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (translations[lang][key]) el.setAttribute('placeholder', translations[lang][key]);
            });
        }

        const uiLangSelect = document.getElementById('ui-lang');
        uiLangSelect.onchange = () => applyLang(uiLangSelect.value);

        const preferred = (navigator.language || '').toLowerCase();
        if (preferred.startsWith('es')) {
            currentLang = 'es';
        } else if (preferred.startsWith('ar')) {
            currentLang = 'ar';
        } else if (preferred.startsWith('hi')) {
            currentLang = 'hi';
        } else if (preferred.startsWith('tl') || preferred.startsWith('fil')) {
            currentLang = 'tl';
        }
        uiLangSelect.value = currentLang;
        applyLang(currentLang);

        const baseUrl = window.location.origin;
        const baseUrlEl = document.getElementById('base-url');
        const copyBaseBtn = document.getElementById('copy-base-btn');
        baseUrlEl.textContent = baseUrl;
        copyBaseBtn.onclick = () => {
            navigator.clipboard.writeText(baseUrl).then(() => {
                copyBaseBtn.textContent = translations[currentLang].copied;
                setTimeout(() => { copyBaseBtn.textContent = translations[currentLang].copy; }, 2000);
            });
        };

        document.getElementById('create-btn').onclick = async () => {
            const res = await fetch('/create-room', { method: 'POST' });
            const data = await res.json();
            window.location.href = '/room/' + data.room_id;
        };

        document.getElementById('share-room-btn').onclick = async () => {
            const res = await fetch('/create-room', { method: 'POST' });
            const data = await res.json();
            const url = `${baseUrl}/room/${data.room_id}`;
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('share-room-btn');
                btn.textContent = translations[currentLang].link_copied;
                setTimeout(() => { btn.textContent = translations[currentLang].share; }, 2000);
            });
        };

        document.getElementById('join-btn').onclick = () => {
            const code = document.getElementById('room-code').value.trim().toLowerCase();
            if (code) window.location.href = '/room/' + code;
        };

        // Allow Enter key to join
        document.getElementById('room-code').onkeydown = (e) => {
            if (e.key === 'Enter') document.getElementById('join-btn').click();
        };
    </script>
</body>
</html>
