<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Translator — Room</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="room-container">
        <div class="header">
            <div class="header-top">
                <h2>Room: <span id="room-code"></span></h2>
                <div class="status" id="status">Connecting...</div>
            </div>
            <div class="header-row">
                <div class="notice compact" data-i18n="notice">
                    Best results on Android Chrome. iOS Safari/WKWebView may not support live dictation.
                </div>
                <div class="lang-toggle">
                    <button class="btn small" data-lang-btn="en">English</button>
                    <button class="btn small secondary" data-lang-btn="es">Espanol</button>
                </div>
            </div>

            <div class="controls-row">
                <div class="language-select">
                    <label for="language" data-i18n="i_speak">I speak:</label>
                    <select id="language">
                        <option value="" data-i18n="select_lang">Select language</option>
                        <option value="en">English</option>
                        <option value="es">Spanish</option>
                        <option value="pt">Portuguese</option>
                        <option value="fr">French</option>
                        <option value="zh">Chinese</option>
                        <option value="ar">Arabic</option>
                        <option value="ru">Russian</option>
                    </select>
                </div>
                <button id="mic-btn" class="btn mic-btn" disabled data-i18n="start_listen">Start Listening</button>
                <div class="call-controls">
                    <button id="call-btn" class="btn secondary" disabled data-i18n="start_call">Start Call</button>
                    <button id="hangup-btn" class="btn secondary" disabled data-i18n="hangup">Hang Up</button>
                </div>
            </div>
        </div>

        <div class="video-area">
            <div class="video-tile">
                <div class="video-label">You</div>
                <video id="local-video" autoplay playsinline muted></video>
            </div>
            <div class="video-tile">
                <div class="video-label">Partner</div>
                <video id="remote-video" autoplay playsinline></video>
            </div>
        </div>

        <div class="subtitles-area" id="subtitles">
            <div class="placeholder" id="placeholder">
                <span data-i18n="placeholder1">Select your language and click "Start Listening" to begin.</span>
                <br><br>
                <span data-i18n="placeholder2">Share the room link with the other person so they can join.</span>
            </div>
        </div>

        <div class="footer">
            <div class="share-link">
                <span data-i18n="share_link">Share link:</span>
                <code id="share-url"></code>
                <button id="copy-btn" class="btn small" data-i18n="copy">Copy</button>
            </div>
            <div class="user-count" id="user-count">0 connected</div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
